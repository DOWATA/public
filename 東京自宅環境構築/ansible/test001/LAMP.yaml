- name: Prepare Ansible Collections
  hosts: localhost
  connection: local
  tasks:
    - name: Install MySQL collection if not present
      command: ansible-galaxy collection install community.mysql
      register: coll_install
      changed_when: "'is already installed' not in coll_install.stdout"


- name: Setup LAMP Stack on AlmaLinux
  hosts: Almalinux
  become: yes
  vars:
    db_name: my_database
    db_user: my_user
    db_password: "UserPassword123!"
    mysql_root_password: "RootPassword123!"

  tasks:
    - name: 0. Install EPEL repository
      dnf:
        name: epel-release
        state: present

    - name: 1. Install Apache, MariaDB, PHP and MySQL client
      dnf:
        name:
          - httpd
          - mariadb-server
          - php
          - php-mysqlnd
          - python3-PyMySQL
        state: present

    - name: 2. Start and Enable Apache & MariaDB
      service:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - httpd
        - mariadb

    - name: 3. Configure Firewall (Open HTTP/HTTPS)
      firewalld:
        service: "{{ item }}"
        permanent: yes
        state: enabled
        immediate: yes
      loop:
        - http
        - https

    - name: 4. Set MariaDB root password
      community.mysql.mysql_user:
        name: root
        host: localhost
        password: "{{ mysql_root_password }}"
        login_unix_socket: /var/lib/mysql/mysql.sock
        #check_password: yes
        state: present
      register: root_pw_set
      ignore_errors: yes

    - name: 5. Create a specific Database
      community.mysql.mysql_db:
        name: "{{ db_name }}"
        login_user: root
        login_password: "{{ mysql_root_password }}"
        state: present

    - name: 6. Create a Database User
      community.mysql.mysql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        priv: "{{ db_name }}.*:ALL"
        login_user: root
        login_password: "{{ mysql_root_password }}"
        state: present

    - name: 7. Create PHP test page
      copy:
        dest: /var/www/html/info.php
        content: "<?php phpinfo(); ?>"
        owner: apache
        group: apache
        mode: '0644'

    - name: 8. Create DB connection test PHP page
      copy:
        dest: /var/www/html/db_test.php
        content: |
          <?php
          $conn = new mysqli('localhost', '{{ db_user }}', '{{ db_password }}', '{{ db_name }}');
          if ($conn->connect_error) { die("Connection failed: " . $conn->connect_error); }
          echo "Database Connected successfully!";
          ?>
        owner: apache
        group: apache
        mode: '0644'